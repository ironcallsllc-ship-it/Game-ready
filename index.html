window.addEventListener('error', function (e) {
  var el = document.getElementById('sb-error-banner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sb-error-banner';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#B23A2E;color:#fff;padding:12px;font-family:sans-serif;font-size:13px;white-space:pre-wrap;z-index:9999;';
    document.body.prepend(el);
  }
  el.textContent = 'Error: ' + (e.message || 'unknown') + (e.filename ? ('\n' + e.filename + ':' + e.lineno) : '');
});
</script>
